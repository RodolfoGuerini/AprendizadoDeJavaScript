<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <main>
        <h1>Verificador de Idade</h1>
        <p>Digite sua idade para saber se voce e maior ou menor de idade.</p>

        <label for="idade">Idade</label>
        <input type="number" id="idade" placeholder="Ex: 18" min="0">

        <button onclick="verificarIdade()">Verificar</button>

        <div id="resultado">Aguardando sua idade...</div>
    </main>

    <script src="../js/script.js"></script>
</body>

</html>
